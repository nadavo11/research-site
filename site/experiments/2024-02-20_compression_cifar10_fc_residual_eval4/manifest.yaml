  warnings:
    - strong edge-detail loss relative to input on all 4 fixed samples
    - baseline mean-color comparator outperforms this run on mean PSNR

interpretation:
  - Reconstruction preserves coarse color blobs but loses fine spatial detail.
  - Mean PSNR is lower than the simple baseline on this fixed slice.
  - Edge density drops sharply, indicating over-smoothing.
  - Variation across samples is large, with sample_004 as a clear failure case.
  - Next run should test larger coded_size and conv/lstm variants on the same fixed list.

