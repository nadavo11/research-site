<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — SAM 3 Both Protocols</title>
    <link rel="stylesheet" href="../../assets/site.css" />
    <style>
        .gallery-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            background: #f1f7fa;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }

        .gallery-toolbar label {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--ink);
        }

        .gallery-toolbar select,
        .gallery-toolbar input {
            font: inherit;
            border: 1px solid #7bb2c0;
            background: #edf7fb;
            color: #0d3b4c;
            border-radius: 999px;
            padding: 5px 12px;
            font-size: 0.86rem;
        }

        .gallery-toolbar input[type="range"] {
            width: 120px;
        }

        .gallery-toolbar .count {
            font-size: 0.85rem;
            color: var(--muted);
            margin-left: auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .gallery figure {
            margin: 0;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fbfdff;
            overflow: hidden;
            position: relative;
        }

        .gallery figure img {
            width: 100%;
            display: block;
            cursor: zoom-in;
            border-radius: 10px 10px 0 0;
        }

        .gallery figure .metrics-bar {
            padding: 6px 8px;
            font-size: 0.78rem;
            line-height: 1.5;
            background: #f7fafd;
            border-top: 1px solid var(--line);
        }

        .gallery-compare {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .compare-row {
            border-bottom: 2px solid var(--line);
            padding-bottom: 20px;
        }

        .compare-row h3 {
            margin-bottom: 15px;
            color: var(--ink);
        }

        .compare-strip {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .compare-card {
            flex: 0 0 300px;
            background: #fbfdff;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            position: relative;
        }

        .compare-card img {
            width: 100%;
            border-radius: 4px;
            cursor: zoom-in;
        }

        .mini-label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .f1-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
            z-index: 10;
        }

        .pill {
            display: inline-block;
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: #eee;
            margin-right: 4px;
            margin-bottom: 4px;
            border: 1px solid #ddd;
        }

        .metric-good {
            background: #edf9f1;
            border-color: #a6dfb8;
            color: #1d7a3e;
        }

        .metric-mid {
            background: #fff9e6;
            border-color: #ffe08a;
            color: #856404;
        }

        .metric-bad {
            background: #fdf2f2;
            border-color: #f8b4b4;
            color: #9b1c1c;
        }
    </style>
</head>

<body>
    <main>
        <section class="hero">
            <h1>Full Preview Gallery</h1>
            <p>SAM 3 RWTD Both Protocols — Multiple experiments with per-image metrics</p>
            <p style="margin-top:8px;"><a class="btn" href="index.html"
                    style="border-color:#8ecae6;background:#edf7fc;color:#0b4f6c;">← Back to report</a></p>
        </section>

        <section class="section">
            <div class="gallery-toolbar">
                <label for="sortBy">Sort:</label>
                <select id="sortBy">
                    <option value="f1_desc">F1 ↓ best first</option>
                    <option value="f1_asc">F1 ↑ worst first</option>
                    <option value="id_asc">Sample ID ↑</option>
                    <option value="id_desc">Sample ID ↓</option>
                </select>
                <label for="filterProtocol">Protocol:</label>
                <select id="filterProtocol" style="font-weight:bold; color:#0b4f6c;">
                    <option value="all">All Methods</option>
                    <option value="oracle_points">Oracle Points</option>
                    <option value="text">Text Prompts</option>
                    <option value="baseline">Unprompted Baseline</option>
                    <option value="feature_cluster_global">Feature Clustering</option>
                </select>
                <label for="viewMode">View Mode:</label>
                <select id="viewMode"
                    style="background:var(--accent); color:white; border:none; padding:4px 12px; border-radius:999px;">
                    <option value="grid">Grid (Masonry)</option>
                    <option value="compare">1-to-1 Comparison</option>
                </select>
                <label for="filterF1">Min F1:</label>
                <input type="range" id="filterF1" min="0" max="100" value="0" />
                <span id="filterF1Val">0.00</span>
                <label for="filterQuality">Quality:</label>
                <select id="filterQuality">
                    <option value="all">All</option>
                    <option value="good">Good (F1 ≥ 0.7)</option>
                    <option value="medium">Medium (0.4–0.7)</option>
                    <option value="bad">Bad (F1 < 0.4)</option>
                </select>
                <span class="count" id="countLabel">Loading...</span>
            </div>
            <div id="fullGallery"></div>
        </section>

        <footer>Full gallery generated from per-image evaluation data. 2026-03-15.</footer>
    </main>

    <dialog class="image-dialog" id="imageDialog">
        <img id="imageDialogImg" alt="Expanded preview" />
    </dialog>

    <script>
        (async () => {
            const resp = await fetch('training_data.json');
            const data = await resp.json();
            const gallery = document.getElementById('fullGallery');
            const sortSel = document.getElementById('sortBy');
            const filterSlider = document.getElementById('filterF1');
            const filterVal = document.getElementById('filterF1Val');
            const filterQual = document.getElementById('filterQuality');
            const filterProtocol = document.getElementById('filterProtocol');
            const viewMode = document.getElementById('viewMode');
            const countLabel = document.getElementById('countLabel');
            const total = data.per_image.length;

            function f1Class(f1) {
                if (f1 >= 0.7) return 'metric-good';
                if (f1 >= 0.4) return 'metric-mid';
                return 'metric-bad';
            }

            function qualityLabel(f1) {
                if (f1 >= 0.7) return 'good';
                if (f1 >= 0.4) return 'medium';
                return 'bad';
            }

            function render() {
                const sortKey = sortSel.value;
                const minF1 = parseFloat(filterSlider.value) / 100;
                const qualFilter = filterQual.value;
                const protoFilter = filterProtocol.value;
                const mode = viewMode.value;
                filterVal.textContent = minF1.toFixed(2);

                let items = data.per_image.filter(img => {
                    if (img.f1 < minF1) return false;
                    if (qualFilter !== 'all' && qualityLabel(img.f1) !== qualFilter) return false;
                    if (protoFilter !== 'all' && img.protocol !== protoFilter) return false;
                    return true;
                });

                items.sort((a, b) => {
                    if (sortKey === 'f1_desc') return b.f1 - a.f1;
                    if (sortKey === 'f1_asc') return a.f1 - b.f1;
                    if (sortKey === 'id_asc') return a.sample_id - b.sample_id || a.id.localeCompare(b.id);
                    if (sortKey === 'id_desc') return b.sample_id - a.sample_id || b.id.localeCompare(a.id);
                    return 0;
                });

                if (mode === 'grid') {
                    gallery.className = 'gallery';
                    gallery.innerHTML = items.map((img, i) => {
                        const cls = f1Class(img.f1);
                        return '<figure>' +
                            '<span class="f1-badge">F1 ' + img.f1.toFixed(3) + '</span>' +
                            '<img src="assets/all_previews/' + img.file_path + '" alt="sample ' + img.id + '" data-zoom-src="assets/all_previews/' + img.file_path + '" />' +
                            '<div class="metrics-bar">' +
                            '<span class="pill">id=' + (img.sample_id || img.id) + '</span>' +
                            '<span class="pill">rank ' + (i + 1) + '/' + items.length + '</span><br/>' +
                            '<span class="pill ' + cls + '">' + img.protocol + '</span>' +
                            '</div>' +
                            '</figure>';
                    }).join('');
                } else {
                    gallery.className = 'gallery-compare';
                    const groups = {};
                    items.forEach(img => {
                        if (!groups[img.sample_id]) groups[img.sample_id] = [];
                        groups[img.sample_id].push(img);
                    });

                    let html = '';
                    Object.keys(groups).sort((a, b) => parseInt(a) - parseInt(b)).forEach(sid => {
                        html += '<div class="compare-row">' +
                            '<h3>Sample ' + sid + '</h3>' +
                            '<div class="compare-strip">';
                        groups[sid].forEach(img => {
                            const cls = f1Class(img.f1);
                            html += '<div class="compare-card">' +
                                '<span class="mini-label">' + img.protocol + '</span>' +
                                '<span class="pill ' + cls + '" style="position:absolute; top:28px; right:8px;">F1 ' + img.f1.toFixed(3) + '</span>' +
                                '<img src="assets/all_previews/' + img.file_path + '" data-zoom-src="assets/all_previews/' + img.file_path + '" />' +
                                '</div>';
                        });
                        html += '</div></div>';
                    });
                    gallery.innerHTML = html;
                }

                countLabel.textContent = 'Showing ' + items.length + ' of ' + total + ' samples';
                bindZoom();
            }

            const dialog = document.getElementById('imageDialog');
            const dialogImg = document.getElementById('imageDialogImg');

            function bindZoom() {
                gallery.querySelectorAll('[data-zoom-src]').forEach(img => {
                    img.addEventListener('click', () => {
                        dialogImg.src = img.getAttribute('data-zoom-src');
                        dialog.showModal();
                    });
                });
            }

            sortSel.addEventListener('change', render);
            filterSlider.addEventListener('input', render);
            filterQual.addEventListener('change', render);
            filterProtocol.addEventListener('change', render);
            viewMode.addEventListener('change', render);

            render();

            dialog.addEventListener('click', (e) => {
                const r = dialog.getBoundingClientRect();
                if (e.clientY < r.top || e.clientY > r.bottom || e.clientX < r.left || e.clientX > r.right) dialog.close();
            });
        })();
    </script>
</body>

</html>
